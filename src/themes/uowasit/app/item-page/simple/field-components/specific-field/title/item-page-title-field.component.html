<h1 class="item-page-title-field" dir="auto">
  @if (item.firstMetadataValue('dspace.entity.type'); as type) {
    <div class="d-inline">
      {{ type.toLowerCase() + '.page.titleprefix' | translate }}
    </div>
  }
  <span class="dont-break-out" [dsMetadata]="nameMetadata"></span>
</h1>
@if (altMetadata) {
  <div class="item-page-title-alt dont-break-out" dir="auto" [dsMetadata]="altMetadata"></div>
}
