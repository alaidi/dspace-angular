<header id="main-site-header">
  <div id="main-site-header-container" class="container d-flex flex-row align-items-center">

    <!-- Logo -->
    <a class="navbar-brand flex-shrink-0" routerLink="/home" role="button" tabindex="0">
      <img id="header-logo" src="assets/uowasit/images/logo.jpg"
           [attr.alt]="'menu.header.image.logo' | translate"/>
    </a>

    <!-- Nav items — takes all remaining space in the middle -->
    <ds-navbar class="flex-fill"></ds-navbar>

    <!-- Right toolbar: search · language · login · mobile toggle -->
    <div id="header-right" class="d-flex align-items-center flex-shrink-0 gap-1">

      <ds-search-navbar></ds-search-navbar>

      <div role="toolbar" [attr.aria-label]="'nav.user.description' | translate"
           class="d-flex align-items-center">
        <ds-lang-switch></ds-lang-switch>
        <ds-context-help-toggle></ds-context-help-toggle>
        <ds-auth-nav-menu></ds-auth-nav-menu>
        <ds-impersonate-navbar></ds-impersonate-navbar>
      </div>

      @if (isMobile$ | async) {
        <div class="ps-1">
          <button id="navbar-toggler" class="navbar-toggler px-0" type="button"
                  (click)="toggleNavbar()"
                  aria-controls="collapsingNav"
                  aria-expanded="false"
                  [attr.aria-label]="'nav.toggle' | translate">
            <span class="fas fa-bars fa-fw toggler-icon" aria-hidden="true"></span>
          </button>
        </div>
      }

    </div>

  </div>
</header>
