name: Build image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dist
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy: SSH into the production host and pull+restart the UI container with
  # the freshly built image. Gated behind ENABLE_DEPLOY so it cannot run until
  # the SSH key + deploy path are configured. Requires:
  #   - secret  SSH_PRIVATE_KEY   : private key authorized to log in as DEPLOY_USER
  #   - secret  DEPLOY_PATH       : absolute dir on the host containing docker-compose.yml
  #   - variable ENABLE_DEPLOY    : set to "true" to activate this job
  #   - variable DEPLOY_HOST (opt): overrides the default host (repository.uowasit.edu.iq)
  #   - variable DEPLOY_USER(opt) : overrides the default user (root)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: vars.ENABLE_DEPLOY == 'true'
    timeout-minutes: 10
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DEPLOY_HOST || 'repository.uowasit.edu.iq' }}
          username: ${{ vars.DEPLOY_USER || 'root' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
